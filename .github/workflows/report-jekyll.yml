name: Build and Deploy Report (Jekyll)

on:
  push:
    paths:
      - "report/**"
      - ".github/workflows/report-jekyll.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: report

      - name: Build site
        working-directory: report
        run: |
          bundle exec jekyll build --destination _site

      - name: Prepare PDF Links
        working-directory: report
        run: |
          pip install beautifulsoup4
          python3 -c '
          import os
          from bs4 import BeautifulSoup

          with open("_site/pdf/index.html", "r") as f:
              soup = BeautifulSoup(f, "html.parser")

          for a in soup.find_all("a", href=True):
              href = a["href"]
              # Skip internal anchor links, external links, and local assets
              if href.startswith("#") or href.startswith("http") or "assets/" in href:
                  continue
              
              # Rewrite relative routing to absolute live domain
              if href.startswith("/"):
                  a["href"] = "https://www.chrismarcum.com" + href
              else:
                  a["href"] = "https://www.chrismarcum.com/data-integrity/" + href

          with open("_site/pdf/index.html", "w") as f:
              f.write(str(soup))
          '

      - name: Generate PDF with Headless Chrome
        working-directory: report
        run: |
          ln -s _site data-integrity
          
          python3 -m http.server 8080 &
          SERVER_PID=$!
          
          sleep 3
          
          google-chrome-stable \
            --headless=new \
            --disable-gpu \
            --no-sandbox \
            --no-margins \
            --no-pdf-header-footer \
            --export-tagged-pdf \
            --print-to-pdf=_site/Federal-Data-Integrity-Report.pdf \
            http://localhost:8080/data-integrity/pdf/
            
          kill $SERVER_PID
          rm data-integrity

      - name: Add Page Numbers
        working-directory: report
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install pypdf reportlab
          
          cat << "EOF" > stamp_pages.py
          import io
          from pypdf import PdfReader, PdfWriter
          from reportlab.pdfgen import canvas
          from reportlab.lib.pagesizes import letter

          reader = PdfReader("_site/Federal-Data-Integrity-Report.pdf")
          writer = PdfWriter()

          # Letter width in points (8.5 * 72 = 612)
          page_width = 612.0

          for i in range(len(reader.pages)):
              page = reader.pages[i]
              
              # Start stamping on the 5th physical page (index 4)
              if i >= 4:
                  packet = io.BytesIO()
                  can = canvas.Canvas(packet, pagesize=letter)
                  can.setFont("Helvetica", 10)
                  
                  page_num = str(i - 3)
                  
                  # Draw string centered, 45 points from the bottom
                  can.drawCentredString(page_width / 2.0, 45, page_num)
                  can.save()
                  packet.seek(0)
                  
                  watermark = PdfReader(packet)
                  page.merge_page(watermark.pages[0])
              
              writer.add_page(page)

          with open("_site/Federal-Data-Integrity-Report.pdf", "wb") as f:
              writer.write(f)
          EOF
          
          python3 stamp_pages.py
          deactivate

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: report/_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4