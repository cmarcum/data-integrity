name: Build and Deploy Report (Jekyll)

on:
  push:
    paths:
      - "report/**"
      - ".github/workflows/report-jekyll.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: report

      - name: Build site
        working-directory: report
        run: |
          bundle exec jekyll build --destination _site

      - name: Generate PDF with Headless Chrome
        working-directory: report
        run: |
          ln -s _site data-integrity
          
          # Rewrite cross-chapter links to point to the live website instead of localhost
          python3 -c '
          import re
          with open("_site/pdf/index.html", "r") as f:
              html = f.read()
          html = re.sub(r"href=[\"'"'"']/data-integrity/(?!assets/)([^\"'"'"']*)[\"'"'"']", r"href=\"https://www.chrismarcum.com/data-integrity/\1\"", html)
          with open("_site/pdf/index.html", "w") as f:
              f.write(html)
          '
          
          python3 -m http.server 8080 &
          SERVER_PID=$!
          
          sleep 3
          
          google-chrome-stable \
            --headless \
            --disable-gpu \
            --no-sandbox \
            --window-size=1920,1080 \
            --no-margins \
            --no-pdf-header-footer \
            --export-tagged-pdf \
            --print-to-pdf=_site/Federal-Data-Integrity-Report.pdf \
            http://localhost:8080/data-integrity/pdf/
            
          kill $SERVER_PID
          rm data-integrity

      - name: Add Page Numbers
        working-directory: report
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install pypdf reportlab
          
          cat << 'EOF' > stamp_pages.py
          import io
          from pypdf import PdfReader, PdfWriter
          from reportlab.pdfgen import canvas
          from reportlab.lib.pagesizes import A4

          reader = PdfReader("_site/Federal-Data-Integrity-Report.pdf")
          writer = PdfWriter()

          # A4 width in points
          page_width = 595.27

          for i in range(len(reader.pages)):
              page = reader.pages[i]
              
              # Start stamping on the 5th physical page (index 4)
              if i >= 4:
                  packet = io.BytesIO()
                  can = canvas.Canvas(packet, pagesize=A4)
                  can.setFont("Helvetica", 10)
                  
                  # Set page number to 1 for the 5th physical page
                  page_num = str(i - 3)
                  
                  # Draw string centered, 45 points from the bottom (safely inside the 1in CSS margin)
                  can.drawCentredString(page_width / 2.0, 45, page_num)
                  can.save()
                  packet.seek(0)
                  
                  watermark = PdfReader(packet)
                  page.merge_page(watermark.pages[0])
              
              writer.add_page(page)

          with open("_site/Federal-Data-Integrity-Report.pdf", "wb") as f:
              writer.write(f)
          EOF
          
          python3 stamp_pages.py
          deactivate

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: report/_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4