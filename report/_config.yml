title: "Report"
description: "Multi-page Jekyll report with sidebar nav, glossary, citations, and PDF build support."
theme: just-the-docs

# May need to replace theme:just-the-docs to remote_theme: just-the-docs for github

# If this site is published from a subpath (e.g., https://USER.github.io/REPO/),
# set baseurl accordingly (example: "/REPO"). For a custom domain/root, leave blank.
baseurl: ""
url: ""

# Enable search (Just the Docs)
search_enabled: true

# Collections
collections:
  chapters:
    output: true
    permalink: /:collection/:name/
  terms:
    output: false
    
just_the_docs:
  collections:
    chapters:
      name: Report
      nav_exclude: false
      nav_fold: false

# Default front matter for chapters
defaults:
  - scope:
      path: ""
      type: chapters
    values:
      layout: default

# Just the Docs navigation behavior
aux_links:
  "Repository":
    - "https://github.com/"

# Markdown settings
markdown: kramdown
kramdown:
  input: GFM

plugins:
#  - jekyll-remote-theme
  - jekyll-scholar

# jekyll-scholar settings
scholar:
  style: apa
  locale: en
  sort_by: author
  order: ascending
  source: _bibliography
  bibliography: references.bib
  replace_strings: true
  details_link: /references/
  details_link_class: reference-link
